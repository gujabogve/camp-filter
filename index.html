<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
	<meta name="theme-color" content="#1c1c22" />
	<link rel="manifest" href="manifest.webmanifest" />
	<link rel="icon" href="icons/favicon-32.png" type="image/png" />
	<link rel="apple-touch-icon" href="icons/icon-192.png" />
	<link rel="stylesheet" href="styles.css" />
	<title>CampSnap Filter</title>
</head>
<body>
	<div class="install-banner" id="installBanner" hidden>
		<img src="icons/icon-192.png" alt="" />
		<span>Install Camp Filter for offline, full-screen use.</span>
		<button id="installBtn" type="button">Install</button>
		<button id="installClose" class="x" type="button" aria-label="Dismiss">&times;</button>
	</div>

	<div class="modal" id="iosModal" hidden>
		<div class="modal-card">
			<h2>Add to Home Screen</h2>
			<ol>
				<li>Tap the <strong>Share</strong> button in Safari's toolbar.</li>
				<li>Scroll down and tap <strong>Add to Home Screen</strong>.</li>
				<li>Tap <strong>Add</strong> &mdash; it installs like an app.</li>
			</ol>
			<button id="iosModalClose" type="button">Got it</button>
		</div>
	</div>

	<main>
		<section class="stage" id="stage">
			<label class="drop" id="dropImage">
				<input type="file" id="imageInput" accept="image/*" hidden />
				<span class="big">Drop a photo</span>
				<span class="hint">or tap to choose</span>
			</label>

			<div class="compare" id="compare" hidden>
				<canvas id="canvas"></canvas>
				<canvas id="canvasBefore"></canvas>
				<div class="filmstrip">
					<button id="prevFilter" type="button" aria-label="Previous filter">&lsaquo;</button>
					<span id="filterName">&mdash;</span>
					<button id="nextFilter" type="button" aria-label="Next filter">&rsaquo;</button>
				</div>
				<div class="divider" id="divider"><span class="grip"></span></div>
				<span class="tag tag-before">before</span>
				<span class="tag tag-after">after</span>
				<button class="clear" id="clearImage" type="button" aria-label="Remove photo">&times;</button>
			</div>
		</section>

		<input type="file" id="fltInput" accept=".flt,text/plain" hidden />
		<div class="picker" id="picker" hidden></div>

		<div class="actions" id="actions" hidden>
			<button id="download" type="button">Download</button>
		</div>

		<p class="app-link"><a href="create.html">+ Create your own filter</a></p>
	</main>

	<script src="filter.js"></script>
	<script src="app.js"></script>
</body>
</html>
